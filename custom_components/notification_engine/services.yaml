create_event:
  name: Create event
  description: Create a notification event with idempotent deduplication.
  target:
    entity:
      domain: person
  fields:
    key:
      name: Event key
      description: Functional key used for deduplication and cleanup logic.
      required: true
      example: "washing_machine_done"
      selector:
        text:
    strategy:
      name: Strategy
      description: Delivery strategy.
      required: true
      default: "alert"
      selector:
        select:
          options:
            - present
            - asap
            - away_reminder
            - alert
            - info
    source_entity:
      name: Source entity
      description: Optional source entity id.
      required: false
      selector:
        text:
    context_label:
      name: Context label
      description: Optional context label.
      required: false
      selector:
        text:
    title:
      name: Title
      description: Notification title.
      required: true
      selector:
        text:
    message:
      name: Message
      description: Notification body.
      required: true
      selector:
        text:
    actions:
      name: Actions
      description: JSON array with action/title objects.
      required: false
      example: '[{"action":"DONE","title":"OK"}]'
      selector:
        text:
    ttl_hours:
      name: TTL hours
      description: Optional expiration delay in hours. Expired pending events are purged on process_events.
      required: false
      example: 24
      selector:
        number:
          min: 0.1
          max: 8760
          step: 0.1
          mode: box
    renotify_minutes:
      name: Re-notify delay
      description: Optional delay in minutes before resending an unacknowledged pending event. Ignored for info.
      required: false
      example: 30
      selector:
        number:
          min: 1
          max: 10080
          step: 1
          mode: box

list_events:
  name: List events
  description: Return all events.

send_info:
  name: Send info
  description: Send an immediate notification without creating an event.
  target:
    entity:
      domain: person
  fields:
    title:
      name: Title
      required: true
      selector:
        text:
    message:
      name: Message
      required: true
      selector:
        text:

process_events:
  name: Process events
  description: Process pending events and send notifications according to strategy.

delete_event:
  name: Delete event
  description: Delete one event by logical key (recommended) or internal id.
  fields:
    key:
      name: Event key
      description: Logical key used when the event was created. Takes priority over id.
      required: false
      example: "washing_machine_done"
      selector:
        text:
    id:
      name: Event id
      description: Internal event id (evt_xxx). Use key instead when possible.
      required: false
      selector:
        text:

purge_events:
  name: Purge events
  description: Delete stored events, optionally filtered by strategy, status, and minimum age.
  fields:
    strategy:
      name: Strategy
      description: Delete only events using this exact delivery strategy.
      required: false
      selector:
        select:
          options:
            - alert
            - present
            - asap
            - away_reminder
            - info
    status:
      name: Status
      description: Delete only events with this exact status.
      required: false
      selector:
        select:
          options:
            - pending
            - done
    older_than_hours:
      name: Older than hours
      description: Delete only events created at least this many hours ago. Must be strictly positive.
      required: false
      selector:
        number:
          min: 0.1
          mode: box
