name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  local-checks:
    name: Local Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: python -m py_compile custom_components/notification_engine/*.py

      - name: JSON validation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = [
              "hacs.json",
              "custom_components/notification_engine/manifest.json",
              "custom_components/notification_engine/strings.json",
              "custom_components/notification_engine/translations/en.json",
              "custom_components/notification_engine/translations/fr.json",
          ]
          for file in files:
              json.load(open(file, "r", encoding="utf-8"))
          print("JSON validation OK")
          PY

  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
